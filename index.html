<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .authors {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .affiliation {
            font-size: 16px;
            color: gray;
            margin-bottom: 30px;
        }

        h2 {
            margin-top: 40px;
            font-size: 26px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            text-align: left;
        }

        .section {
            margin-top: 20px;
        }

        .video-container {
            margin-top: 20px;
        }

        iframe {
            width: 100%;
            height: 450px;
            border: none;
        }

        .content {
            text-align: left;
        }
    </style>
</head>

<body>

    <!-- 🌟 HEADER -->
    <div class="header">
        <h1>Project Title Goes Here</h1>
        <div class="authors">
            Author 1, Author 2, Author 3
        </div>
        <div class="affiliation">
            University of Maryland
        </div>
    </div>

    <div class="container">

        <!-- Overview -->
        <div class="section">
            <h2>Overview</h2>
            <p>
                Write a concise overview of your project here.
            </p>
        </div>

        <!-- Data Collection -->
        <div class="section">
            <h2>Data Collection</h2>
            <p>
                Describe how data was collected.
            </p>

            <div class="video-container">
                <!-- Local video or YouTube iframe goes here -->
            </div>
        </div>

    </div>

</body>
</html>
